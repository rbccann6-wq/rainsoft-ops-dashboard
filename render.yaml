services:
  - type: web
    name: rainsoft-ops-dashboard
    runtime: node
    buildCommand: npm install --legacy-peer-deps && npm run build
    startCommand: node server.js
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: TENANT_ID
        sync: false
      - key: CLIENT_ID
        sync: false
      - key: CLIENT_SECRET
        sync: false
      - key: MAILBOX_EMAIL
        sync: false
      - key: IME_USERNAME
        sync: false
      - key: IME_PASSWORD
        sync: false
